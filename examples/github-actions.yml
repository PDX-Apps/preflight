# Preflight on GitHub Actions.
#
# Copy to .github/workflows/preflight.yml in your project. A single invocation runs the
# checks once and fans out to every output: inline PR annotations, a job-summary table,
# a SARIF report for the Security tab, and a JSON artifact. Drop any --write/--report you
# don't want — they don't re-run the checks, so keeping them is cheap.
name: Preflight

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  security-events: write # for the SARIF upload

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          # A coverage driver is needed for the Tests step's coverage reports. Use 'none'
          # if you don't run coverage; pcov is the fastest option when you do.
          coverage: pcov

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      # One run, every output. --format=github annotates the PR diff and sets the exit code;
      # --write renders the same result to the job summary and a SARIF file; --report keeps a
      # JSON artifact. The --write/--report targets do not re-run the checks.
      #
      # Coverage reports come from the Tests step config in your preflight.php, e.g.:
      #     Tests::make()->coverage(['clover' => 'build/coverage.xml', 'html' => 'build/coverage'])
      #         ->minCoverage(90)
      # Preflight measures coverage in the same run (no separate test invocation).
      - name: Run Preflight
        run: |
          vendor/bin/preflight \
            --format=github \
            --write=markdown:"$GITHUB_STEP_SUMMARY" \
            --write=sarif:preflight.sarif \
            --report=preflight-report.json

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: preflight-report
          path: preflight-report.json

      # Coverage artifact (produced by the Tests step when coverage is configured in
      # preflight.php). Upload it for download, or send build/coverage.xml to Codecov/Coveralls.
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: build/coverage
          if-no-files-found: ignore

      # Publish findings to the Security tab (Code scanning). Needs code scanning available —
      # public repos have it; private repos need GitHub Advanced Security. Drop this step (and
      # the security-events permission) if you don't want it.
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: preflight.sarif

  # Optional: a faster PR-only job that checks just the changed files — and, if your
  # preflight.php sets ->minPatchCoverage(N), gates coverage of the lines this PR changed.
  preflight-changed:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # needed so --since can diff against the base branch

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          # A driver is needed only if you gate patch coverage; use 'none' otherwise.
          coverage: pcov

      - run: composer install --no-interaction --no-progress --prefer-dist

      # --since scopes the run to the PR diff. With a patch-coverage gate configured —
      #     Tests::make()->coverage(['clover' => 'build/coverage.xml'])->minPatchCoverage(90)
      # — this fails the PR if the changed lines aren't covered, naming the exact lines.
      - name: Preflight (changed files only)
        run: vendor/bin/preflight --since=origin/${{ github.base_ref }} --format=github
