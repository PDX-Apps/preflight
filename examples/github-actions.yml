# Preflight on GitHub Actions.
#
# Copy to .github/workflows/preflight.yml in your project. This showcases three
# integrations — inline PR annotations, a job-summary table, and SARIF code scanning.
# Each `preflight` invocation runs the checks, so trim to just the outputs you want.
name: Preflight

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  security-events: write # for the SARIF upload (code-scanning job)

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      # --format=github puts failures inline on the PR diff; the exit code fails the job.
      # --report writes a JSON artifact (uploaded below).
      - name: Run Preflight
        run: vendor/bin/preflight --format=github --report=preflight-report.json

      # A per-step summary table on the run's summary page. This runs the checks again in
      # markdown; if you'd rather not re-run, make this your only Preflight step.
      - name: Job summary
        if: always()
        run: vendor/bin/preflight --format=markdown >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preflight-report
          path: preflight-report.json

  # Publish findings to the Security tab (Code scanning) as SARIF. Needs code scanning
  # available — public repos have it; private repos need GitHub Advanced Security.
  code-scanning:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - run: composer install --no-interaction --no-progress --prefer-dist

      # Produce SARIF even when checks fail, so findings still reach the Security tab.
      - name: Preflight (SARIF)
        run: vendor/bin/preflight --format=sarif > preflight.sarif || true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: preflight.sarif

  # Optional: a faster PR-only job that checks just the changed files.
  preflight-changed:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # needed so --since can diff against the base branch

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - run: composer install --no-interaction --no-progress --prefer-dist

      - name: Preflight (changed files only)
        run: vendor/bin/preflight --since=origin/${{ github.base_ref }} --format=github
