# Preflight's own CI — it runs itself on its own code (dogfooding).
#
# A single `preflight` invocation runs the checks once and fans out to every output:
# inline PR annotations (--format=github), a job-summary table (--write=markdown),
# a SARIF report for the Security tab (--write=sarif), and a JSON artifact (--report).
# The build fails if any check fails; the uploads still run (if: always()).
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  security-events: write # for the SARIF upload

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # so --since can diff against the base branch if needed

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: pcov # a driver for the Tests step's coverage reports

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      # One run, every output. --format=github puts failures inline on the PR diff and sets
      # the exit code; --write renders the same result to the job summary and a SARIF file;
      # --report keeps a JSON artifact. None of the --write/--report targets re-run the checks.
      - name: Preflight
        run: |
          php bin/preflight \
            --format=github \
            --write=markdown:"$GITHUB_STEP_SUMMARY" \
            --write=sarif:preflight.sarif \
            --report=preflight-report.json

      - name: Upload run report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: preflight-report
          path: preflight-report.json

      # Coverage reports produced by the Tests step (see preflight.php) — same run, no re-test.
      # Uploads both the Clover XML (build/coverage.xml) and the browsable HTML (build/coverage/).
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: build
          if-no-files-found: ignore

      # Publish the Clover report to Codecov for the trend graph + badge.
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: PDX-Apps/preflight
          files: ./build/coverage.xml
          fail_ci_if_error: false

      # Publish findings to the Security tab as SARIF (written by the run above, even on failure).
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: preflight.sarif

  # PR-only: scope the run to the diff and dogfood the patch-coverage gate
  # (preflight.php sets ->minPatchCoverage(90)), so a PR's changed lines must be tested.
  preflight-changed:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # so --since can diff against the base branch

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: pcov # patch coverage needs a driver

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Preflight (changed lines)
        run: php bin/preflight --since=origin/${{ github.base_ref }} --format=github

  # Guard the supported floors: the suite must pass on the lowest supported PHP (8.3) and the
  # current major (8.4), against both the lowest Symfony (7.4) and the current major (8) —
  # apps pull whichever their PHP/framework locks. Running on each PHP also catches parse-level
  # features (e.g. new-without-parentheses) that static analysis tolerates.
  compat:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']
        symfony: ['^7.4', '^8.0']
        exclude:
          # Symfony 8 requires PHP 8.4, so a PHP 8.3 app resolves to Symfony 7 — that's the
          # supported combination, not an impossible one to force here.
          - php: '8.3'
            symfony: '^8.0'
    steps:
      - uses: actions/checkout@v6

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Pin Symfony ${{ matrix.symfony }}
        run: composer require "symfony/console:${{ matrix.symfony }}" "symfony/process:${{ matrix.symfony }}" --no-update --no-interaction

      - name: Install dependencies
        run: composer update --no-interaction --no-progress --prefer-dist

      - name: Tests
        run: vendor/bin/phpunit
